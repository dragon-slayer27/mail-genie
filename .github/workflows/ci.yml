name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
    
    # We require legacy peer deps due to Tailwind CSS v4, TipTap, and React 19 constraints
    - name: Install dependencies
      run: npm install --legacy-peer-deps
    
    - name: Run linter
      run: npm run lint
      
    - name: Build the project
      run: npm run build
